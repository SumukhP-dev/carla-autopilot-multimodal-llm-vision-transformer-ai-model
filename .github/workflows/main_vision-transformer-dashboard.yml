# Docs: https://github.com/Azure/webapps-deploy
# Build runs in vision-transformer-dashboard/ — repo root has no package.json.
#
# IMPORTANT: In Azure Deployment Center, do NOT choose "Overwrite the workflow"
# or this file will be replaced with Azure's default (npm at repo root = ENOENT).
#
# Deploy uses a Publish Profile secret (no OIDC client-id/tenant-id required).
# GitHub → Settings → Secrets → Actions → add AZURE_WEBAPP_PUBLISH_PROFILE:
#   Azure Portal → your Web App → Get publish profile (downloads XML) → paste entire file.

name: Build and deploy Node.js app to Azure Web App - vision-transformer-dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: vision-transformer-dashboard/package-lock.json

      - name: Install, build, production prune
        working-directory: vision-transformer-dashboard
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: vision-transformer-dashboard

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: vision-transformer-dashboard
          package: .
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
