apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-transformer-dashboard
  namespace: vision-dashboard
  labels:
    app: vision-transformer-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vision-transformer-dashboard
  template:
    metadata:
      labels:
        app: vision-transformer-dashboard
    spec:
      containers:
        - name: vision-transformer-dashboard
          image: vision-transformer-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: COLLISION_RISK_API_URL
              value: http://collision-risk-backend:4000
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vision-transformer-dashboard
  namespace: vision-dashboard
  labels:
    app: vision-transformer-dashboard
spec:
  type: ClusterIP
  selector:
    app: vision-transformer-dashboard
  ports:
    - port: 80
      targetPort: 8080
      name: http
