apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vision-transformer-dashboard
  namespace: vision-dashboard
spec:
  rules:
    - host: vision-dashboard.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vision-transformer-dashboard
                port:
                  number: 80
