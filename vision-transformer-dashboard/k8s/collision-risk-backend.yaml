apiVersion: apps/v1
kind: Deployment
metadata:
  name: collision-risk-backend
  namespace: vision-dashboard
  labels:
    app: collision-risk-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collision-risk-backend
  template:
    metadata:
      labels:
        app: collision-risk-backend
    spec:
      containers:
        - name: collision-risk-backend
          image: collision-risk-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
          env:
            - name: PORT
              value: "4000"
          readinessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: collision-risk-backend
  namespace: vision-dashboard
  labels:
    app: collision-risk-backend
spec:
  type: ClusterIP
  selector:
    app: collision-risk-backend
  ports:
    - port: 4000
      targetPort: 4000
      name: http
